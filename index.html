<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── Identidade ───────────────────────────────────────────────────── -->
    <title>Radar Urbano — O que está acontecendo agora?</title>
    <meta name="description" content="Acompanhe em tempo real bares, trânsito, eventos e hotspots da sua cidade. Reporte e ganhe pontos." />
    <meta name="theme-color" content="#ff2d55" />

    <!-- ── PWA / Mobile ────────────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Radar Urbano" />
    <meta name="format-detection" content="telephone=no" />
    <!-- Previne que iOS redirecione para app nativo do Maps ao clicar coordenadas -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- ── Favicon ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- ── PWA Manifest ─────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph (WhatsApp, Telegram, iMessage) ────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://omnex-d9b3e.web.app/" />
    <meta property="og:title"       content="Radar Urbano — O que está acontecendo agora?" />
    <meta property="og:description" content="Acompanhe em tempo real bares, trânsito e eventos da cidade. Reporte e ganhe pontos." />
    <meta property="og:image"       content="https://omnex-d9b3e.web.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="pt_BR" />
    <meta property="og:site_name"   content="Radar Urbano" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Radar Urbano — O que está acontecendo agora?" />
    <meta name="twitter:description" content="Acompanhe em tempo real bares, trânsito e eventos da cidade." />
    <meta name="twitter:image"       content="https://omnex-d9b3e.web.app/og-image.png" />

    <!-- ── Fontes ───────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</html>
